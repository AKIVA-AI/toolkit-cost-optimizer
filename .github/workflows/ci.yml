name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .

      - name: Run tests with coverage (fail-under=70)
        run: |
          pytest --cov=toolkit_cost_latency_opt --cov-report=xml --cov-report=term --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .

      - name: Run ruff
        run: ruff check .

      - name: Run pyright
        run: pyright

  service-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install service dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./services/cost-optimization-engine[dev,testing]"
          pip install aiosqlite cryptography

      - name: Run service tests with coverage (fail-under=70)
        env:
          ENVIRONMENT: test
          DATABASE_URL: "sqlite:///"
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret-key
        run: |
          cd services/cost-optimization-engine
          pytest tests/ -x -q --tb=short --cov=toolkit_cost_optimization_engine --cov-report=term --cov-fail-under=70

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit
          pip install -e ".[dev]" || pip install -e .
          pip install -e "./services/cost-optimization-engine[dev,testing]"

      - name: Run pip-audit (CLI package)
        run: pip-audit --strict --desc

      - name: Run bandit (CLI package)
        run: bandit -r src/ -c pyproject.toml || bandit -r src/ -ll

      - name: Run bandit (service)
        run: bandit -r services/cost-optimization-engine/src/ -ll

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build service Docker image
        run: |
          docker build -t toolkit-cost-optimizer-service:ci \
            -f services/cost-optimization-engine/Dockerfile \
            services/cost-optimization-engine/

  cli-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Test CLI commands
        run: |
          toolkit-opt --help
          toolkit-opt validate --help
          toolkit-opt summarize --help
          toolkit-opt recommend --help
          toolkit-opt simulate --help
